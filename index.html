<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F97316">
<title>리듬 — PT 운동 흐름 체크</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --org:#FFC66F; --orgD:#E05E05; --orgT:#895300; --orgBtn:#FFA213; --orgInk:#3A2400;
  --peach:#FFF6E8; --peach2:#FFE9C4; --warm:#FFF9F2;
  --ink:#18181A; --mut:#6B6B70; --faint:#8C8B90; --emptydot:#D4D4D8;
  --line:#E4E4E7; --bg:#F5F5F6; --card:#FFFFFF;
  --ok:#0F7A5E; --okBg:#E4F3ED; --warn:#B7791F; --warnBg:#FDF3E2;
  --bad:#C0392B; --badBg:#FCECEA;
  --orgLedge:#A46400; --peachLedge:#EAC888; --lineLedge:#D6D5D9;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:focus-visible{outline:2px solid var(--orgT);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;
  background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
#app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--card);display:flex;flex-direction:column}
.page{flex:1;padding:18px 18px 96px;overflow-y:auto;position:relative}
.veil-top{position:absolute;top:0;left:0;right:0;height:26px;pointer-events:none;z-index:5;
  -webkit-mask-image:linear-gradient(to bottom, black 0%, transparent 100%);
  mask-image:linear-gradient(to bottom, black 0%, transparent 100%);
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
  background:linear-gradient(to bottom, var(--card) 35%, transparent 100%)}
button{font-family:inherit;border:none;cursor:pointer;background:none;font-size:14px}
input,select{font-family:inherit;font-size:16px}
h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
h2{font-size:15px;font-weight:700}
.mut{color:var(--mut);font-size:13px}
.cap{color:var(--mut);font-size:11px;font-weight:600}
/* ── 눌리는 버튼: 면(face)이 그림자 받침(ledge) 위에 놓여 눌리는 물리감 ── */
.pill,.ansbtn,.chip{
  position:relative;
  transform:translateY(0);
  transition:transform .26s cubic-bezier(.34,1.56,.64,1),
             box-shadow .28s cubic-bezier(.34,1.56,.64,1),
             filter .15s ease, background .15s ease;
}
.pill:active,.ansbtn:active,.chip:active{
  transition:transform .09s ease-out, box-shadow .09s ease-out;
}
.pill{padding:13px 18px;border-radius:16px;font-size:14px;font-weight:700;background:var(--orgBtn);color:var(--orgInk);
  box-shadow:0 3px 0 0 var(--orgLedge), 0 8px 16px -9px rgba(255,162,19,.5)}
.pill:hover{filter:brightness(1.06)}
.pill:active{transform:translateY(3px);box-shadow:0 0 0 0 var(--orgLedge), 0 2px 5px -2px rgba(255,162,19,.55)}
.pill.ghost{background:var(--peach);color:var(--orgT);box-shadow:0 3px 0 0 var(--peachLedge), 0 6px 14px -10px rgba(255,162,19,.2)}
.pill.ghost:hover{filter:brightness(.99)}
.pill.ghost:active{transform:translateY(3px);box-shadow:0 0 0 0 var(--peachLedge)}
.pill.line{background:#fff;color:var(--mut);border:1.5px solid var(--line);
  box-shadow:0 3px 0 0 var(--lineLedge), 0 6px 14px -11px rgba(24,23,26,.2)}
.pill.line:hover{background:var(--bg)}
.pill.line:active{transform:translateY(3px);box-shadow:0 0 0 0 var(--lineLedge)}
.pill.wide{width:100%;padding:15px}
.pill[disabled]{opacity:.4;pointer-events:none;box-shadow:none;transform:none}
.card{background:var(--bg);border-radius:14px;padding:16px;border:1px solid var(--line)}
.badge{font-size:10px;font-weight:700;padding:4px 10px 4px 8px;border-radius:99px;white-space:nowrap;
  background:var(--ink);color:#fff;display:inline-flex;align-items:center;gap:5px}
.badge .hdot{width:6px;height:6px;border-radius:50%;flex:none}
.b-ok{box-shadow:0 0 14px -3px rgba(15,122,94,.55)}
.b-ok .hdot{background:#34d399}
.b-warn{box-shadow:0 0 14px -3px rgba(255,198,111,.6)}
.b-warn .hdot{background:var(--org)}
.b-none{background:var(--bg);color:var(--faint);box-shadow:none}
.b-none .hdot{background:var(--faint)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 4px}
.logo{font-size:16px;font-weight:800}.logo span{color:var(--org)}
.nav{position:sticky;bottom:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);
  border-top:.5px solid var(--line);display:flex;padding:8px 0 calc(10px + env(safe-area-inset-bottom));position:relative}
.navpill{position:absolute;top:6px;height:calc(100% - 12px);background:var(--bg);border-radius:14px;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1), width .35s cubic-bezier(.34,1.56,.64,1);z-index:0}
.nav button{flex:1;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;color:var(--faint);font-weight:700;
  transition:transform .15s ease, color .15s ease}
.nav button:active{transform:scale(.88)}
.nav button.on{color:var(--orgT)}
.nav svg{width:20px;height:20px}
.row{background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:14px 15px;margin-bottom:9px}
.row.need{border-color:var(--line)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--mut);margin-bottom:6px}
.txt{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:13px;background:#fff}
.toast{position:sticky;top:0;z-index:60;margin:0 14px;background:var(--ink);color:#fff;border-radius:0 0 14px 14px;
  padding:12px 16px;font-size:13px;font-weight:600;animation:drop .3s ease}
@keyframes drop{from{transform:translateY(-100%);opacity:0}to{transform:none;opacity:1}}
.hero{background:linear-gradient(160deg,var(--peach),#fff);border-radius:22px;padding:26px 20px;text-align:center}
.hero.calm{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:22px 18px}
.ansbtn{width:100%;padding:16px;border-radius:18px;font-size:16px;font-weight:700;margin-bottom:10px}
.a1{background:var(--orgBtn);color:var(--orgInk);box-shadow:0 4px 0 0 var(--orgLedge), 0 10px 20px -11px rgba(255,162,19,.45)}
.a1:hover{filter:brightness(1.05)}
.a1:active{transform:translateY(4px);box-shadow:0 0 0 0 var(--orgLedge)}
.a2{background:#fff;border:1.5px solid var(--line);color:var(--ink);box-shadow:0 4px 0 0 var(--lineLedge)}
.a2:hover{background:var(--bg)}
.a2:active{transform:translateY(4px);box-shadow:0 0 0 0 var(--lineLedge)}
.a3{background:none;color:var(--faint);font-size:13px;text-decoration:underline;transition:opacity .12s ease}
.a3:active{opacity:.5}
.chip{padding:11px 8px;border-radius:14px;background:#fff;border:1.5px solid var(--line);font-weight:700;font-size:14px;text-align:center;
  box-shadow:0 2px 0 0 var(--lineLedge)}
.chip:active{transform:translateY(2px);box-shadow:0 0 0 0 var(--lineLedge)}
.chip.on{background:var(--orgBtn);color:var(--orgInk);border-color:var(--orgBtn);box-shadow:0 2px 0 0 var(--orgLedge)}
.chip.on:active{box-shadow:0 0 0 0 var(--orgLedge)}
button.mut{transition:opacity .12s ease}
button.mut:active{opacity:.5}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.statcard{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px}
.statcard b{font-size:22px;display:block;margin-top:2px}
.kpi3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.kpi3 .statcard{padding:11px 10px}
.kpi3 .statcard b{font-size:19px}
.statcard.accent{background:var(--peach);border-color:var(--peach2)}
.statcard.accent b{color:var(--orgT)}
.wg-rate{width:38px;flex:none;text-align:right;font-size:11px;font-weight:800;color:var(--ink)}
.wg-head .wg-rate{color:var(--faint);font-weight:700}
.wg-nav{display:flex;align-items:center;justify-content:space-between;margin:2px 0 12px}
.wg-navbtn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--card);
  color:var(--mut);font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;
  transition:background .15s ease, transform .12s ease}
.wg-navbtn:active{transform:scale(.9)}
.wg-navbtn:hover{background:var(--bg)}
.wg-navbtn[disabled]{opacity:.35;pointer-events:none}
.wg-navlabel{text-align:center;line-height:1.35}
.wg-navweek{font-size:14px;font-weight:800;display:block}
.wg-navtag{font-size:11px;font-weight:700;color:var(--orgT)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.wg{margin-bottom:10px}
.wg-row{display:flex;align-items:center;gap:8px;padding:9px 2px;border-bottom:1px solid var(--line)}
.wg-name{width:58px;flex:none;font-size:12.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wg-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;flex:1}
.wg-cell{aspect-ratio:1;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center}
.wg-head .wg-cell{background:none;color:var(--faint);font-weight:700;font-size:11px}
.wg-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px}
.wg-legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--mut)}
.tbl th{text-align:left;padding:8px 6px;color:var(--mut);font-weight:700;border-bottom:1px solid var(--line)}
.tbl td{padding:8px 6px;border-bottom:1px solid var(--line)}
.spin{display:flex;justify-content:center;padding:40px 0;color:var(--faint);font-size:13px}
.heroring{background:linear-gradient(160deg,#fff,var(--bg));border:1px solid var(--line);border-radius:16px;
  padding:18px 20px;display:flex;align-items:center;gap:18px;margin-bottom:16px}
.heroring .meta{flex:1}
.mrow{display:flex;align-items:center;gap:12px}
.mrow .body{flex:1;min-width:0}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.hidden{display:none!important}

/* ── 폼 카드 진입 애니메이션 (로그인/가입/프로필완성) ── */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(14px);filter:blur(6px)}to{opacity:1;transform:none;filter:blur(0)}}
.authcard{background:#fff;border:1px solid var(--line);border-radius:20px;padding:28px 22px;
  box-shadow:0 24px 56px -24px rgba(24,23,26,.22);animation:fadeSlideUp .5s cubic-bezier(.22,1,.36,1)}

/* ── 에러 시 흔들림 ── */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(4px)}}
.shake{animation:shake .4s ease}

/* ── 필드 안 아이콘 + 유효 체크 ── */
.field-ic{position:relative}
.field-ic svg.fi{position:absolute;left:12px;top:38px;color:var(--faint);pointer-events:none}
.field-ic .txt{padding-left:38px}
.field-ic .ok-check{position:absolute;right:12px;top:38px;color:var(--ok);
  transform:scale(0);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.field-ic .ok-check.on{transform:scale(1)}

/* ── 비밀번호 강도 미터 ── */
.pwmeter{display:flex;gap:4px;margin-top:8px;align-items:center}
.pwmeter .bar{height:4px;flex:1;border-radius:99px;background:var(--line);transition:background .25s ease}
.pwmeter .lbl{font-size:11px;color:var(--faint);width:46px;text-align:right;flex:none}

/* ── 온보딩 스텝 도트 + 슬라이드 전환 ── */
.stepdots{display:flex;justify-content:center;gap:6px;margin-bottom:22px}
.stepdots i{height:6px;width:6px;border-radius:99px;background:var(--line);display:block;
  transition:width .35s cubic-bezier(.34,1.56,.64,1),background .25s ease}
.stepdots i.on{background:var(--org);width:22px}
.stepdots i.done{background:var(--org)}
@keyframes slideStep{from{opacity:0;transform:translateX(26px);filter:blur(5px)}to{opacity:1;transform:none;filter:blur(0)}}
.stepwrap{animation:slideStep .38s cubic-bezier(.22,1,.36,1)}

/* ── 완료 축하 버스트 ── */
@keyframes burstPop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes burstFly{0%{transform:translate(0,0) scale(0);opacity:1}55%{opacity:1}100%{transform:var(--fly) scale(1);opacity:0}}
@keyframes drawCheck{to{stroke-dashoffset:0}}
.burst{position:relative;width:68px;height:68px;margin:0 auto}
.burst .core{position:absolute;inset:0;border-radius:50%;background:var(--ok);display:flex;align-items:center;justify-content:center;
  animation:burstPop .4s cubic-bezier(.34,1.56,.64,1)}
.burst .p{position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;margin:-3px;
  animation:burstFly .65s ease-out forwards;animation-delay:.15s;opacity:0}
.burst svg path{stroke-dasharray:20;stroke-dashoffset:20;animation:drawCheck .35s .3s ease forwards}

/* ── 원형 링: 그려지듯 차오르는 애니메이션 + 완료 시 은은한 글로우 (컨페티 대신 절제) ── */
.ringwrap{position:relative;display:inline-flex;border-radius:50%}
.ring-fill{transition:stroke-dashoffset 1s cubic-bezier(.22,1,.36,1)}
@keyframes ringGlow{0%{box-shadow:0 0 0 0 rgba(15,122,94,.32)}70%{box-shadow:0 0 0 9px rgba(15,122,94,0)}100%{box-shadow:0 0 0 0 rgba(15,122,94,0)}}
.ring-done{animation:ringGlow 1.6s ease-out 1}

/* ── 오늘 케어 리스트: 순차 진입 + 미해결 상태만 은은하게 숨쉬는 점 ── */
@keyframes rowIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.carein{animation:rowIn .4s cubic-bezier(.22,1,.36,1) both}
@keyframes softPulse{0%,100%{opacity:1}50%{opacity:.32}}
.hdot.pulse{animation:softPulse 1.7s ease-in-out infinite}

/* ── 2단 슬라이딩 토글 ── */
.seg2{position:relative;display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:3px}
.seg2 button{position:relative;z-index:1;padding:7px 15px;font-size:12px;font-weight:700;color:var(--mut);border-radius:9px;transition:color .2s ease;width:64px}
.seg2 button.on{color:var(--ink)}
.seg2-thumb{position:absolute;top:3px;left:3px;width:calc(50% - 3px);height:calc(100% - 6px);background:#fff;border-radius:9px;
  box-shadow:0 1px 3px rgba(24,23,26,.12);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════════════════════
   설정 — 본인 Supabase 프로젝트 정보로 반드시 교체하세요
   ═══════════════════════════════════════════════════════════ */
const SUPABASE_URL = 'https://ktcindjocrsndhxwtwfm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0Y2luZGpvY3JzbmRoeHd0d2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNzQ3MTMsImV4cCI6MjA5OTg1MDcxM30._lib0VeTqnzkHL6iT363jCi7pFmaEQvEWn_BFg5IgqA';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ═══════ 상태 ═══════ */
let SESSION = { user: null, profile: null };
let PENDING_PROFILE = null;
let CACHE = { members: [], checks: [], contacts: [] };
let UI = { tab:'care', toast:null, loading:false, editId:null, memberFilter:'all', authErr:'', authMode:'login', weekOffset:0 };
const DAYS = ['일','월','화','수','목','금','토'];
const DAYS_MON = ['월','화','수','목','금','토','일'];
const pad2 = n => String(n).padStart(2,'0');
const todayKey = () => { const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); };
const nowDow = () => new Date().getDay();
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
const esc = s => String(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

/* ═══════ 화면 표시 전용 헬퍼 — 데이터/로직에 관여하지 않음 ═══════ */
function pwScore(pw){ let s=0; if(pw.length>=8)s++; if(/[0-9]/.test(pw))s++; if(/[A-Z]/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw))s++; return s; }
function updatePwStrength(val){
  const score=pwScore(val);
  const labels=['너무 짧아요','약해요','보통이에요','좋아요','강력해요'];
  const colors=['var(--bad)','var(--bad)','var(--warn)','#8BC34A','var(--ok)'];
  for(let i=0;i<4;i++){ const bar=document.getElementById('pwbar'+i); if(bar) bar.style.background = i<score ? colors[score] : 'var(--line)'; }
  const lbl=document.getElementById('pwlabel'); if(lbl) lbl.textContent = val ? labels[score] : '';
}
function toggleValidIcon(id, ok){ const el=document.getElementById(id); if(el) el.classList.toggle('on', !!ok); }
function stepDots(cur,total){ let s='<div class="stepdots">'; for(let i=1;i<=total;i++) s+=`<i class="${i<cur?'done':i===cur?'on':''}"></i>`; return s+'</div>'; }

let __pillRect = null;
function positionNavPill(){
  const pill = document.getElementById('navpill');
  const btn = document.querySelector('.nav button.on');
  if(!pill || !btn) return;
  const targetLeft = btn.offsetLeft, targetWidth = btn.offsetWidth;
  if(__pillRect){
    pill.style.transition='none';
    pill.style.width = __pillRect.w+'px';
    pill.style.transform = `translateX(${__pillRect.l}px)`;
    pill.getBoundingClientRect();
    pill.style.transition='';
  }
  requestAnimationFrame(()=>{
    pill.style.width = targetWidth+'px';
    pill.style.transform = `translateX(${targetLeft}px)`;
    __pillRect = { l:targetLeft, w:targetWidth };
  });
}
function toast(s){ UI.toast=s; render(); setTimeout(()=>{ if(UI.toast===s){UI.toast=null;render();} },3500); }
function copy(s){ if(navigator.clipboard){navigator.clipboard.writeText(s).catch(()=>{});}
  else{const t=document.createElement('textarea');t.value=s;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();} }
function linkOf(kind,id){ return location.origin+location.pathname+'#/'+kind+'/'+id; }
// 카카오 알림톡 버튼 URL 변수용 — 프로토콜(https://)은 템플릿 등록 시 고정영역으로
// 이미 박아두므로, 변수값에는 도메인 이하만 담아야 이중으로 안 겹칩니다.
// linkNoProto: 카카오 알림톡 버튼 URL 변수용(프로토콜 고정영역 규칙) —
// 이 로직은 이제 daily-send Edge Function 안에만 있고, 프론트엔드에선 쓰지 않습니다.

// 세션은 Supabase Auth가 자체적으로 브라우저에 안전하게 저장·복원합니다.

/* ═══════════════════════════════════════════════════════════
   데이터 레이어 — Supabase 호출 전부 여기 모음
   ═══════════════════════════════════════════════════════════ */
const DB = {
  async loadAll(trainerId){
    const [{data:members}, {data:checks}, {data:contacts}] = await Promise.all([
      sb.from('members').select('*').eq('trainer_id', trainerId).order('created_at',{ascending:false}),
      sb.from('check_logs').select('*').eq('trainer_id', trainerId).order('check_date',{ascending:false}),
      sb.from('contact_logs').select('*').eq('trainer_id', trainerId)
    ]);
    CACHE.members = members||[]; CACHE.checks = checks||[]; CACHE.contacts = contacts||[];
  },
  async createMember(trainerId, name, phone){
    const { data, error } = await sb.from('members').insert({
      trainer_id: trainerId, name, phone, invite_token: uid(), status:'pending', invite_status:'created'
    }).select().single();
    if (error){ toast('회원 추가 실패: '+error.message); return null; }

/* ═══════════════════════════════════════════════════════════
   비즈니스 로직 (순수 함수, CACHE 기준으로 계산)
   ═══════════════════════════════════════════════════════════ */
function memberChecks(memberId){ return CACHE.checks.filter(c=>c.member_id===memberId); }
function memberContacts(memberId){ return CACHE.contacts.filter(c=>c.member_id===memberId); }

function weekRange(){
  const d=new Date(); const day=(d.getDay()+6)%7;
  const mon=new Date(d); mon.setDate(d.getDate()-day); mon.setHours(0,0,0,0);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const f=x=>x.getFullYear()+'-'+pad2(x.getMonth()+1)+'-'+pad2(x.getDate());
  return { start:f(mon), end:f(sun) };
}
// 주간 오프셋 범위 (offset 0 = 이번 주, -1 = 지난 주 ...)
function weekRangeOffset(offset){
  const d=new Date(); const day=(d.getDay()+6)%7;
  const mon=new Date(d); mon.setDate(d.getDate()-day + offset*7); mon.setHours(0,0,0,0);
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const f=x=>x.getFullYear()+'-'+pad2(x.getMonth()+1)+'-'+pad2(x.getDate());
  return { start:f(mon), end:f(sun), monDate:mon };
}
// "n월 n주차" — 그 주 목요일이 속한 달 기준으로 계산 (월 경계 혼란 방지)
function weekLabel(offset){
  const {monDate}=weekRangeOffset(offset);
  const thu=new Date(monDate); thu.setDate(monDate.getDate()+3);
  const month=thu.getMonth()+1;
  const first=new Date(thu.getFullYear(), thu.getMonth(), 1);
  const firstDay=(first.getDay()+6)%7;
  const firstThu=new Date(first); firstThu.setDate(1 + ((3-firstDay)+7)%7);
  const weekNo=Math.floor((thu.getDate()-firstThu.getDate())/7)+1;
  return `${month}월 ${weekNo}주차`;
}
function weeklyDone(memberId){
  const {start,end}=weekRange();
  return memberChecks(memberId).filter(c=>c.check_type!=='morning' && c.response==='completed' && c.check_date>=start && c.check_date<=end).length;
}
function weeklyGoal(m){ return Math.max(1,(m.preferred_days||[]).length); }

/* ── 요일별 상태 격자 (월~일) — 기존 check_logs만으로 계산, DB 변경 없음 ──
   상태: none(대상 아님·발송 없음) / done(다녀옴) / difficult(어려움) / noresp(발송했으나 미응답) */
function weekGrid(m, offset=0){
  const {start,end}=weekRangeOffset(offset);
  const mon=new Date(start+'T00:00:00');
  const checks=memberChecks(m.id).filter(c=>c.check_type!=='morning' && c.check_date>=start && c.check_date<=end);
  const cells=[];
  for(let i=0;i<7;i++){                       // 0=월 ... 6=일
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const key=d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
    const dow=d.getDay();                      // 0=일 ... 6=토
    const log=checks.find(c=>c.check_date===key);
    let st='none';
    if(log){
      if(log.response==='completed') st='done';
      else if(log.response==='difficult') st='difficult';
      else if(log.sent_at) st='noresp';
      else st='none';
    }
    const isTarget = (m.reminder_level==='light') ? (dow===0) : (m.preferred_days||[]).includes(dow);
    cells.push({ label:DAYS[dow], st, isTarget });
  }
  return cells;
}

/* ── 상태 아이콘 (형태로 구분 — 이미지2 레퍼런스) ── */
function statusIcon(st, isTarget, size=18){
  const S=size, c=S/2, r=S/2-1.4;
  const wrap=(inner)=>`<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" fill="none" style="display:block">${inner}</svg>`;
  if(st==='done'){
    return wrap(`<circle cx="${c}" cy="${c}" r="${c}" fill="var(--ok)"/><path d="M${S*0.28} ${S*0.52} L${S*0.44} ${S*0.68} L${S*0.74} ${S*0.34}" stroke="#fff" stroke-width="${S*0.11}" stroke-linecap="round" stroke-linejoin="round"/>`);
  }
  if(st==='difficult'){
    return wrap(`<circle cx="${c}" cy="${c}" r="${r}" stroke="var(--orgBtn)" stroke-width="1.6"/><path d="M${c} ${c-r} A ${r} ${r} 0 0 1 ${c} ${c+r} Z" fill="var(--orgBtn)"/>`);
  }
  if(st==='noresp'){
    return wrap(`<circle cx="${c}" cy="${c}" r="${r}" stroke="var(--bad)" stroke-width="1.6"/><path d="M${c-r*0.5} ${c-r*0.5} L${c+r*0.5} ${c+r*0.5}" stroke="var(--bad)" stroke-width="1.6" stroke-linecap="round"/>`);
  }
  // none: 대상이면 점선 원(예정), 아니면 아주 옅은 점
  if(isTarget){
    return wrap(`<circle cx="${c}" cy="${c}" r="${r}" stroke="var(--faint)" stroke-width="1.4" stroke-dasharray="2.4 2.4"/>`);
  }
  return wrap(`<circle cx="${c}" cy="${c}" r="1.6" fill="var(--emptydot)"/>`);
}

/* ── 시그니처 원형 링: 이번 주 이행률 시각화 (그려지듯 차오름) ── */
function ring(done, goal, size=40){
  goal = Math.max(1, goal);
  const pct = Math.min(1, done/goal);
  const sw = size>=80 ? 8 : 5;
  const r = (size - sw) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - pct);
  const cx = size / 2;
  const col = pct>=1 ? 'var(--ok)' : done===0 ? 'var(--emptydot)' : 'var(--org)';
  const numSize = (size*0.34).toFixed(1);
  const denSize = (size*0.22).toFixed(1);
  return `<span class="ringwrap${pct>=1?' ring-done':''}">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex:none" aria-hidden="true">
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${sw}"/>
      <circle class="ring-fill" cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"
        stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${c.toFixed(1)}" data-off="${off.toFixed(1)}" transform="rotate(-90 ${cx} ${cx})"/>
      <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" fill="var(--ink)"
        font-weight="800" font-size="${numSize}">${done}<tspan fill="var(--faint)" font-weight="700" font-size="${denSize}">/${goal}</tspan></text>
    </svg>
  </span>`;
}
function animateRings(){
  requestAnimationFrame(()=>{ document.querySelectorAll('.ring-fill').forEach(c=>{ c.style.strokeDashoffset = c.dataset.off; }); });
}
// 퍼센트 값을 직접 받아 그리는 링 (회원별 평균처럼 done/goal 카운트가 아닌 비율 자체가 지표일 때 사용)
function ringPercent(pct, size=88){
  const p = Math.max(0, Math.min(100, pct));
  const sw = size>=80 ? 8 : 5;
  const r = (size-sw)/2, c = 2*Math.PI*r, off = c*(1-p/100), cx = size/2;
  const col = p>=100 ? 'var(--ok)' : p===0 ? 'var(--emptydot)' : 'var(--org)';
  const numSize=(size*0.30).toFixed(1), pctSize=(size*0.16).toFixed(1);
  return `<span class="ringwrap${p>=100?' ring-done':''}">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex:none" aria-hidden="true">
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${sw}"/>
      <circle class="ring-fill" cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"
        stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${c.toFixed(1)}" data-off="${off.toFixed(1)}" transform="rotate(-90 ${cx} ${cx})"/>
      <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" fill="var(--ink)"
        font-weight="800" font-size="${numSize}">${Math.round(p)}<tspan fill="var(--faint)" font-weight="700" font-size="${pctSize}">%</tspan></text>
    </svg>
  </span>`;
}

function isTodayTarget(m){
  if (m.reminder_level==='light') return nowDow()===0;
  return (m.preferred_days||[]).includes(nowDow());
}
function todayCheckFor(memberId, type){
  const tk=todayKey();
  return memberChecks(memberId).find(c=>c.check_date===tk && c.check_type===type) || null;
}
function last3(memberId){
  return memberChecks(memberId).filter(c=>c.check_type!=='morning').slice(0,3);
}
function recentNoResponseStreak(memberId){
  const list = memberChecks(memberId).filter(c=>c.check_type!=='morning').slice(0,3);
  let n=0; for(const c of list){ if(!c.response) n++; else break; } return n;
}
function careReason(m){
  if (m.track_enabled===false) return null;
  const t = todayCheckFor(m.id, m.reminder_level==='light'?'weekly':'evening');
  if (t && t.response==='difficult') return { key:'difficult', label:'오늘은 어려웠어요' };
  if (t && !t.response && t.sent_at) return { key:'no_response', label:'미응답' };
  if (recentNoResponseStreak(m.id) >= 2) return { key:'repeated_no_response', label:'반복 미응답' };
  return null;
}
function alreadyContactedToday(memberId){
  const t0=new Date(); t0.setHours(0,0,0,0);
  return memberContacts(memberId).some(c=> new Date(c.contacted_at) >= t0);
}
function careMembers(){
  return CACHE.members.filter(m=>m.status==='active' && careReason(m) && !alreadyContactedToday(m.id));
}
function recommendText(m, reasonKey){

    no_response: `오늘 운동 체크가 아직 안 되어 있어서 가볍게 연락드려요.\n\n바쁘셔서 확인이 어려우셨을 수도 있을 것 같아요.\n오늘 운동이 어려우셨다면 괜찮고,\n이번 주에 다른 날 조금이라도 움직일 수 있는 시간으로 다시 잡아보면 좋을 것 같습니다.\n\n편한 시간 있으시면 알려주세요.`,
    repeated_no_response: `최근에 운동 체크가 몇 번 비어 있어서 가볍게 확인드려요.\n\n요즘 일정이 바쁘면 목표한 대로 운동 가는 게 쉽지 않을 수 있습니다.\n부담드리려는 건 아니고,\n흐름이 완전히 끊기지 않게 이번 주에 짧게라도 움직일 수 있는 시간을 같이 잡아보면 좋을 것 같아요.\n\n편한 시간 있으실까요?`
  };
  return map[reasonKey] || map.no_response;
}

// 채널 발송(카카오/솔라피)은 이제 daily-send Edge Function(크론)이 전담합니다.
// 프론트엔드에서는 더 이상 채널 발송을 직접 트리거하지 않습니다.
async function refreshTodayChecks(){
  // 채널 자동발송은 daily-send 크론이 전담합니다.
  // 이 버튼은 "오늘 케어" 리스트가 최신 상태인지 확인/보정만 합니다
  // (신규 등록·설정 변경 회원 등 크론이 놓쳤을 수 있는 빈틈 메우기, 채널 발송 없음).
  UI.loading=true; render();
  const targets = CACHE.members.filter(m=>m.status==='active' && m.track_enabled!==false && isTodayTarget(m));
  let made=0;
  for(const m of targets){
    const type = m.reminder_level==='light' ? 'weekly' : 'evening';
    const log = todayCheckFor(m.id, type);
    if(!log){ await DB.createCheckLog(m.id, SESSION.user.id, type); made++; }
    if(m.reminder_level==='frequent'){
      const mExists = todayCheckFor(m.id,'morning');
      if(!mExists){ await DB.createCheckLog(m.id, SESSION.user.id, 'morning'); }
    }
  }
  UI.loading=false;
  toast(made>0 ? `${made}명 확인 완료 — 오늘 케어 리스트에 반영됐어요` : '이미 최신 상태예요, 놓친 회원 없음');
  render();
}

    : (m.name+'님, 오늘 목표하신 운동, 잘 다녀오셨나요?\n\n'+url);

async function markContact(memberId, reasonKey){
  const mm = CACHE.members.find(x=>x.id===memberId);
  const t = todayCheckFor(memberId, mm && mm.reminder_level==='light'?'weekly':'evening');
  await DB.createContact(memberId, SESSION.user.id, t?t.id:null, reasonKey);
  toast('연락 완료로 기록했어요'); render();
}
async function saveMemberField(id, field, value){
  await DB.updateMember(id, { [field]: value });
  toast('저장됐어요'); render();
}

/* ═══════ 회원 온보딩 (초대 링크) ═══════ */
let OB = { step:1, phone:'', consent:false, days:[], level:'normal', member:null, _loaded:false };
async function loadInvite(token){
  const m = await DB.findMemberByToken(token);
  OB.member = m;
  if(m){ OB.phone=m.phone||''; }
  render();
}
function obNext(){
  if(OB.step===1){
    if(!OB.consent){ toast('알림 수신 동의가 필요해요'); return; }
    OB.step=2;
  } else if(OB.step===2){
    if(OB.days.length===0){ toast('요일을 1개 이상 선택해주세요'); return; }
    OB.step=3;
  }
  render();
}
async function obFinish(){
  if(!OB.member) return;
  UI.loading=true; render();
  await DB.updateMember(OB.member.id, {
    phone: OB.phone, preferred_days: OB.days, reminder_level: OB.level,
    consent_at: new Date().toISOString(), invite_status:'completed', status:'active'
  });
  UI.loading=false; OB.step=4; render();
}

/* ═══════ 회원 체크 응답 (고정 링크 — 회원당 토큰 1개, 날짜는 그때그때 계산) ═══════ */
let CHK = { log:null, member:null, _loaded:false };
async function loadCheckByToken(token){
  const m = await DB.findMemberByToken(token);
  CHK.member = m;
  if(!m){ render(); return; }
  const type = m.reminder_level==='light' ? 'weekly' : 'evening';
  let log = await DB.findExistingCheck(m.id, type);
  if(!log){
    // 트레이너가 "오늘 대상 생성"을 안 눌렀어도, 회원이 먼저 링크를 열면 그 자리에서 생성
    log = await DB.createCheckLog(m.id, m.trainer_id, type);
  }
  if(log && !log.opened_at){ log = await DB.updateCheckLog(log.id, { opened_at: new Date().toISOString() }) || log; }
  CHK.log = log;
  render();
}
async function submitCheck(response){
  await DB.updateCheckLog(CHK.log.id, { response, response_at: new Date().toISOString(), need_care: response==='difficult' });
  CHK.log = { ...CHK.log, response, need_care: response==='difficult' }; render();
}

function render(){
  const app=document.getElementById('app');
  const hash=location.hash;
  if(hash.startsWith('#/invite/')){ app.style.background='var(--warm)'; return renderRoute(app, viewInvite()); }
  if(hash.startsWith('#/check/')){ app.style.background='var(--warm)'; return renderRoute(app, viewCheckPage()); }
  app.style.background='var(--card)';

  if(!SESSION.user) return renderRoute(app, viewAuth());
  if(!SESSION.profile) return renderRoute(app, viewCompleteProfile());

  let body = UI.tab==='care' ? viewCare() : UI.tab==='members' ? viewMembers() : viewSummary();
  app.innerHTML = (UI.toast?`<div class="toast">${esc(UI.toast)}</div>`:'')
    + `<div class="topbar"><div class="logo">리<span>:</span>듬</div>
        <button class="mut" style="text-decoration:underline" onclick="doLogout()">${esc(SESSION.profile.name)} · 로그아웃</button></div>`
    + `<div class="page"><div class="veil-top"></div>${UI.loading?'<div class="spin">불러오는 중...</div>':body}</div>` + nav();
  animateRings();
  positionNavPill();
}
function renderRoute(app, body){ app.innerHTML = (UI.toast?`<div class="toast">${esc(UI.toast)}</div>`:'') + body; }
function nav(){

  return `<div class="nav">
    <span class="navpill" id="navpill"></span>
    ${it('care','오늘 케어',`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>`)}

/* ── 이번 주 요약 ── */
function viewSummary(){
  const wo = UI.weekOffset||0;
  const {start,end} = weekRangeOffset(wo);
  const active = CACHE.members.filter(m=>m.status==='active');
  const evChecks = CACHE.checks.filter(c=>c.check_type!=='morning' && c.check_date>=start && c.check_date<=end);
  const sent = evChecks.filter(c=>c.sent_at).length;
  const completed = evChecks.filter(c=>c.response==='completed').length;
  const difficult = evChecks.filter(c=>c.response==='difficult').length;
  const noresp = evChecks.filter(c=>c.sent_at && !c.response).length;
  const wkStartD = new Date(start+'T00:00:00'); const wkEndExclD = new Date(end+'T00:00:00'); wkEndExclD.setDate(wkEndExclD.getDate()+1);
  const contactsThisWeek = CACHE.contacts.filter(c=>{const t=new Date(c.contacted_at); return t>=wkStartD && t<wkEndExclD;}).length;
  const needCareCount = evChecks.filter(c=>c.need_care || (c.sent_at && !c.response)).length;
  const carecount = careMembers().length; // '오늘' 기준 — 주차 이동과 무관 (항상 지금)

  // 회원별 이행률(다녀옴/발송)·응답률(응답/발송)을 각각 구한 뒤, 회원 수만큼 평균 —
  // 발송 많은 회원에게 쏠리지 않도록 모든 회원을 동일 가중치로 반영
  const perMember = active.map(m=>{
    const mc = memberChecks(m.id).filter(c=>c.check_type!=='morning' && c.check_date>=start && c.check_date<=end);
    const msent = mc.filter(c=>c.sent_at).length;
    if(!msent) return null;
    const mdone = mc.filter(c=>c.response==='completed').length;
    const mresp = mc.filter(c=>c.response==='completed'||c.response==='difficult').length;
    return { done:mdone, sent:msent, adh: mdone/msent*100, resp: mresp/msent*100 };
  }).filter(Boolean);
  const avg = arr => arr.length ? Math.round(arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
  const adhPct = avg(perMember.map(x=>x.adh));       // 이행률 — 회원별 평균
  const respPct = avg(perMember.map(x=>x.resp));      // 응답률 — 회원별 평균
  const followPct = needCareCount ? Math.min(100, Math.round(contactsThisWeek/needCareCount*100)) : 0;

  // 요일 격자의 회원별 '이행' — 그 주 실제 발송 로그 기준 (현재 스케줄이 아니라 과거 실제 값 사용 → 주차 이동해도 왜곡 없음)
  const memberRateOffset = m => {
    const mc = memberChecks(m.id).filter(c=>c.check_type!=='morning' && c.check_date>=start && c.check_date<=end);
    const msent = mc.filter(c=>c.sent_at).length;
    if(!msent) return null;
    return Math.round(mc.filter(c=>c.response==='completed').length/msent*100);
  };
  const weekHasData = perMember.length>0;

  return `
    <h1 style="margin-bottom:2px">주간 요약</h1>
    <p class="mut" style="margin-bottom:14px;font-size:12px">관리 회원·케어 필요는 지금 기준, 나머지는 선택한 주 기준이에요</p>
    <div class="statgrid">
      <div class="statcard"><span class="cap">관리 회원 · 지금</span><b>${active.length}명</b></div>
      <div class="statcard accent"><span class="cap">케어 필요 · 지금</span><b>${carecount}명</b></div>
    </div>
    <div class="wg-nav">
      <button class="wg-navbtn" onclick="UI.weekOffset=(UI.weekOffset||0)-1;render()" aria-label="이전 주">‹</button>
      <div class="wg-navlabel">
        <span class="wg-navweek">${weekLabel(wo)}</span>
        ${wo===0?'<span class="wg-navtag">이번 주</span>':`<span class="mut" style="font-size:11px">${start.slice(5).replace('-','.')} ~ ${end.slice(5).replace('-','.')}</span>`}
      </div>
      <button class="wg-navbtn" onclick="if((UI.weekOffset||0)<0){UI.weekOffset=(UI.weekOffset||0)+1;render()}" aria-label="다음 주" ${wo>=0?'disabled':''}>›</button>
    </div>
    ${!weekHasData ? `<div class="card" style="text-align:center;padding:28px 16px"><p class="mut">이 주에는 기록이 없어요</p></div>` : `
    <div class="heroring">
      ${ringPercent(adhPct, 88)}
      <div class="meta">
        <p class="cap">이행률 (회원별 평균)</p>
        <p style="font-size:24px;font-weight:800;margin:1px 0 2px">${adhPct}%</p>
        <p class="mut" style="font-size:12px">발송 대비 다녀온 비율을 회원별로 구해 평균낸 값이에요</p>
        <p class="mut" style="font-size:11px;margin-top:2px">이번 체크가 발송된 ${perMember.length}명 기준${active.length>perMember.length?` (전체 ${active.length}명 중)`:''}</p>
      </div>
    </div>
    <div class="kpi3">
      <div class="statcard"><span class="cap">이행률</span><b>${adhPct}%</b></div>
      <div class="statcard"><span class="cap">응답률</span><b>${respPct}%</b></div>
      <div class="statcard"><span class="cap">후속 연락률</span><b>${followPct}%</b></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <p class="cap" style="margin-bottom:8px">상세 (전체 합계)</p>
      <p style="font-size:13px;margin:4px 0">체크 발송 <b style="float:right">${sent}회</b></p>
      <p style="font-size:13px;margin:4px 0">다녀왔어요 <b style="float:right">${completed}</b></p>
      <p style="font-size:13px;margin:4px 0">오늘은 어려웠어요 <b style="float:right">${difficult}</b></p>
      <p style="font-size:13px;margin:4px 0">미응답 <b style="float:right">${noresp}</b></p>
      <p style="font-size:13px;margin:4px 0">후속 연락 <b style="float:right">${contactsThisWeek}회</b></p>
    </div>
    <div class="wg">
      <div class="wg-row wg-head">
        <span class="wg-name"></span>
        <div class="wg-cells">${DAYS_MON.map(d=>`<span class="wg-cell">${d}</span>`).join('')}</div>
        <span class="wg-rate">이행</span>
      </div>
      ${active.map(m=>{
        const cells = weekGrid(m, wo);
        const r = memberRateOffset(m);
        return `<div class="wg-row">
          <span class="wg-name">${esc(m.name)}</span>
          <div class="wg-cells">${cells.map(c=>{
            return `<span class="wg-cell">${statusIcon(c.st, c.isTarget)}</span>`;
          }).join('')}</div>
          <span class="wg-rate">${r===null?'-':r+'%'}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="wg-legend">
      <span>${statusIcon('done',true,15)}다녀옴</span>
      <span>${statusIcon('difficult',true,15)}어려움</span>
      <span>${statusIcon('noresp',true,15)}미응답</span>
      <span>${statusIcon('none',true,15)}예정</span>
      <span>${statusIcon('none',false,15)}대상 아님</span>
    </div>`}
  `;
}

/* ── 회원 초대 온보딩 (링크로 진입, 로그인 불필요) ── */
function viewInvite(){
  const token = location.hash.slice(9);
  if(!OB.member && !OB._loaded){ OB._loaded=true; loadInvite(token); return '<div class="spin">불러오는 중...</div>'; }
  if(!OB.member) return `<div class="page" style="padding-top:80px;text-align:center"><h2>링크를 찾을 수 없어요</h2></div>`;
  if(OB.member.status==='active' && OB.step<4) OB.step=4;

  if(OB.step===1){
    return `<div class="page" style="padding-top:44px">
      ${stepDots(1,3)}
      <div class="stepwrap">
      <p style="font-size:13px;font-weight:700;color:var(--orgT)">리<span style="color:var(--org)">:</span>듬</p>
      <h1 style="margin:8px 0 16px">${esc(OB.member.name)}님, 반가워요</h1>
      <p class="mut" style="margin-bottom:22px;line-height:1.6">PT 없는 날에도 운동 흐름이 끊기지 않도록<br>가볍게 확인을 도와드릴게요.<br><br>알림 빈도는 직접 선택할 수 있고,<br>부담스럽지 않은 방식으로 진행됩니다.</p>
      <div class="field"><label>전화번호</label>
        <input class="txt" value="${esc(OB.phone)}" placeholder="010-0000-0000" oninput="OB.phone=this.value"></div>
      <label style="display:flex;align-items:center;gap:8px;margin:16px 0;font-size:13px">
        <input type="checkbox" ${OB.consent?'checked':''} onchange="OB.consent=this.checked;render()" style="width:18px;height:18px">
        알림 수신 및 개인정보 이용에 동의합니다</label>
      <button class="pill wide" onclick="obNext()">다음</button>
      </div>
    </div>`;
  }
  if(OB.step===2){
    return `<div class="page" style="padding-top:44px">
      ${stepDots(2,3)}
      <div class="stepwrap">
      <h1 style="margin-bottom:8px">주로 개인운동 가는<br>요일을 선택해주세요</h1>
      <p class="mut" style="margin-bottom:20px">정확하지 않아도 괜찮아요.<br>평소에 가려고 하는 날만 가볍게 선택해주세요.</p>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:24px">
        ${DAYS.map((d,i)=>`<button class="chip ${OB.days.includes(i)?'on':''}"
          onclick="OB.days.includes(${i})?OB.days=OB.days.filter(x=>x!==${i}):OB.days.push(${i});render()">${d}</button>`).join('')}
      </div>
      <button class="pill wide" onclick="obNext()">다음</button>
      </div>
    </div>`;
  }
  if(OB.step===3){
    const opts=[['frequent','자주 챙김','아침 알림 + 저녁 확인'],['normal','필요한 만큼','저녁 확인만 (기본)'],['light','가끔 안부','주 1회만']];
    return `<div class="page" style="padding-top:44px">
      ${stepDots(3,3)}
      <div class="stepwrap">
      <h1 style="margin-bottom:20px">운동 확인 빈도를<br>선택해주세요</h1>
      ${opts.map(([v,t,d])=>`<div class="row" style="cursor:pointer;border-color:${OB.level===v?'var(--org)':'var(--line)'};background:${OB.level===v?'var(--peach)':'var(--card)'}" onclick="OB.level='${v}';render()">
        <b>${t}</b><p class="mut" style="font-size:12px;margin-top:2px">${d}</p></div>`).join('')}
      <button class="pill wide" style="margin-top:10px" onclick="obFinish()" ${UI.loading?'disabled':''}>${UI.loading?'저장 중...':'설정 완료'}</button>
      </div>
    </div>`;
  }
  return `<div class="page" style="padding-top:90px;text-align:center">
    <div class="stepwrap">
    <div class="burst">
      <span class="p" style="--fly:translate(-30px,-26px);background:#10b981"></span>
      <span class="p" style="--fly:translate(30px,-26px);background:#38bdf8;animation-delay:.18s"></span>
      <span class="p" style="--fly:translate(-34px,10px);background:#f59e0b;animation-delay:.12s"></span>
      <span class="p" style="--fly:translate(34px,10px);background:#8b5cf6;animation-delay:.2s"></span>
      <span class="p" style="--fly:translate(0,-38px);background:#10b981;animation-delay:.08s"></span>
      <span class="p" style="--fly:translate(0,34px);background:#38bdf8;animation-delay:.22s"></span>
      <span class="core"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M5.5 12.5l4.5 4.5 8.5-9.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
    </div>
    <h1 style="margin:16px 0 8px">설정이 완료되었어요</h1>
    <p class="mut" style="line-height:1.6">선택하신 요일에 맞춰<br>운동 흐름을 가볍게 확인드릴게요.</p>
    </div>
  </div>`;
}

/* ── 체크 응답 (고정 링크, 회원별 확인빈도에 따라 저녁/주간 자동 판단) ── */
function viewCheckPage(){
  const token = location.hash.slice(8);
  if(!CHK.log && !CHK._loaded){ CHK._loaded=true; loadCheckByToken(token); return '<div class="spin">불러오는 중...</div>'; }
  if(!CHK.member) return `<div class="page" style="padding-top:80px;text-align:center"><h2>링크를 찾을 수 없어요</h2></div>`;
  const m = CHK.member, log = CHK.log;
  const kind = m.reminder_level==='light' ? 'weekly' : 'evening';
  if(log && log.response){
    const good = log.response==='completed';
    return `<div class="page" style="padding-top:60px;text-align:center">
      <div class="hero"><p style="font-size:36px">${good?'✅':'🌱'}</p>
        <h1 style="margin:10px 0 8px">${good
          ? (kind==='weekly'?'좋아요.<br>이번 주 흐름을 잘 이어가셨어요.':'좋아요.<br>오늘 운동 흐름을 잘 이어가셨어요.')
          : '괜찮아요.<br>다음에 다시 이어가면 됩니다.'}</h1>
        <p class="mut" style="line-height:1.6">${good?'기록해둘게요.':'무리하지 않는 선에서\n흐름이 끊기지 않게 도와드릴게요.'}</p>
      </div></div>`;
  }
  const q = kind==='weekly'
    ? `이번 주 운동 흐름은<br>어떠셨나요?`
    : `${esc(m?.name||'')}님,<br>오늘 목표하신 운동,<br>잘 다녀오셨나요?`;
  const sub = kind==='weekly'
    ? '완벽하지 않아도 괜찮아요.\n이번 주에 조금이라도 움직이셨다면 기록해두고,\n어려우셨다면 다음 주에 다시 이어가면 됩니다.'
    : '무리하지 않아도 괜찮아요.\n다녀오셨다면 기록해두고,\n어려우셨다면 다음 흐름으로 이어가면 됩니다.';
  const b1 = kind==='weekly' ? '움직였어요' : '다녀왔어요';
  const b2 = kind==='weekly' ? '이번 주는 어려웠어요' : '오늘은 어려웠어요';
  return `<div class="page" style="padding-top:56px;text-align:center">
    <h1 style="margin-bottom:10px;line-height:1.4">${q}</h1>
    <p class="mut" style="margin-bottom:26px;white-space:pre-line;line-height:1.6">${sub}</p>
    <button class="ansbtn a1" onclick="submitCheck('completed')">${b1}</button>
    <button class="ansbtn a2" onclick="submitCheck('difficult')">${b2}</button>
  </div>`;
}

/* ═══════ 부트 ═══════ */
window.doLogin=doLogin; window.doLogout=doLogout; window.addMember=addMember; window.copyInvite=copyInvite;
window.refreshTodayChecks=refreshTodayChecks; window.sendLinkFor=sendLinkFor; window.markContact=markContact;
window.saveMemberField=saveMemberField; window.obNext=obNext; window.obFinish=obFinish; window.submitCheck=submitCheck;
window.copy=copy; window.toast=toast; window.UI=UI; window.OB=OB; window.CACHE=CACHE;
window.addEventListener('hashchange', ()=>{ OB={step:1,phone:'',consent:false,days:[],level:'normal',member:null,_loaded:false};
  CHK={log:null,member:null,_loaded:false}; render(); });
// iOS Safari는 이 리스너가 없으면 버튼의 :active 상태가 터치에서 발동하지 않습니다 (디자인 전용, 로직 무관)
document.addEventListener('touchstart', function(){}, {passive:true});

window.doSignup=doSignup; window.completeProfile=completeProfile;
(async ()=>{
  try{
    const { data:{session} } = await sb.auth.getSession();
    if(session){
      UI.loading=true; render();
      SESSION.user = session.user;
      await loadProfile();
      UI.loading=false;
    }
  }catch(e){ /* Supabase 설정 전이면 여기서 실패할 수 있음 — 로그인 화면으로 진행 */ }
  render();
})();
</script>
